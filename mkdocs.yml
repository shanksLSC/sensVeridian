site_name: sensVeridian
site_description: Ground-truth cache and distance-aware augmentation pipeline for vision ML model evaluation
site_url: https://shanksLSC.github.io/sensVeridian/
repo_url: https://github.com/shanksLSC/sensVeridian
repo_name: shanksLSC/sensVeridian
edit_uri: edit/main/docs/docs/
docs_dir: docs/docs
site_dir: site

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.emoji
  - pymdownx.tasklist
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.arithmatex
  - admonition
  - tables
  - toc

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Architecture: getting-started/architecture.md
  - User Guide:
      - Features: user-guide/features.md
      - CLI Reference: user-guide/cli.md
      - Data Model: user-guide/data-model.md
      - Sample Queries: user-guide/queries.md
      - Python API: user-guide/python-api.md
  - Redis Setup:
      - Overview: redis/overview.md
      - Server Management: redis/management.md
      - Configuration: redis/config.md
  - Augmentation:
      - Distance Sweep: augmentation/distance-sweep.md
      - Camera Calibration: augmentation/calibration.md
      - Manual Overrides: augmentation/manual-overrides.md
  - Operations:
      - Environment Variables: operations/environment.md
      - Operational Tips: operations/tips.md
      - Troubleshooting: operations/troubleshooting.md
  - API: api.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shanksLSC/sensVeridian
